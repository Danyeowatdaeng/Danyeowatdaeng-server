spring:
  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
  jpa:
    hibernate:
      ddl-auto: update
  logging:
    level:
      root: DEBUG
  data:
    redis:
      host: localhost
      port: 6379

logging:
  level:
    com.planit: DEBUG
    org.springframework.web: INFO

jwt:
  secret: "your-super-secret-key-that-should-be-long-and-secure-for-production"
  expirationMs: 7200000 # 2시간 (밀리초)
  refreshTokenExpirationMs: 2592000000 # 30일 (밀리초)
  tokenPrefix: "Bearer "
  issuer: "tourapi"
  audiences:
    - "web"
    - "mobile"

app:
  auth:
    cookie-domain: ""          # HostOnly 쿠키 (로컬)
    cookie-secure: false       # HTTP에서도 저장

# AWS S3 설정 (개발환경)
aws:
  s3:
    bucket: ${AWS_S3_BUCKET:pet-avatar-dev-apne2}
    region: ${AWS_S3_REGION:ap-northeast-2}
    cloudfrontDomain: ${AWS_CLOUDFRONT_DOMAIN:}
    presignExpireSeconds: ${AWS_PRESIGN_EXPIRE_SECONDS:600}
    maxFileSize: ${AWS_S3_MAX_FILE_SIZE:10485760}  # 10MB

