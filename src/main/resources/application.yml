token:
  store:
    impl: lua
  refresh:
    ttl-seconds: 1209600
  hmac-secret: ${REFRESH_HMAC_SECRET:dev-change-me-please}

spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}  # 기본 dev
    include: oauth
    # 필요시 password, timeout 등 추가 가능
  jackson:
    serialization:
      write-dates-as-timestamps: false
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}



# 공통 설정이 있다면 여기에
jwt:
  secret: your-super-secret-key-that-should-be-long-and-secure

gemini:
  api-key: ${GEMINI_API_KEY:your-gemini-api-key-here}
  base-url: https://generativelanguage.googleapis.com/v1beta
  model: gemini-1.5-flash
  max-tokens: 1000
  temperature: 0.7
  system-prompt: "당신은 반려동물 전문 상담사입니다. 반려동물과 관련된 질문에 친절하고 정확하게 답변해주세요. 한국어로 답변하며, 전문적이면서도 따뜻한 톤으로 응답해주세요."