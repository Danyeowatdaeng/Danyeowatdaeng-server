token:
  store:
    impl: lua
  refresh:
    ttl-seconds: 1209600
  hmac-secret: ${REFRESH_HMAC_SECRET:dev-change-me-please}

spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}  # 기본 dev
    include: oauth
    # 필요시 password, timeout 등 추가 가능
  jackson:
    serialization:
      write-dates-as-timestamps: false
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}



# 공통 설정이 있다면 여기에
jwt:
  secret: your-super-secret-key-that-should-be-long-and-secure

tour:
  api:
    base-url: http://apis.data.go.kr/B551011/KorPetTourService
    service-key: ${TOURAPI_SERVICE_KEY:}
    location-based-list-path: /locationBasedList
    search-keyword-path: /searchKeyword
    connection-timeout: 5000
    read-timeout: 10000
    max-retries: 3

