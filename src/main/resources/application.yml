petavatar:
  enabled: true
  provider: mock  # 임시로 mock 모드로 설정
  providerBaseUrl: https://generativelanguage.googleapis.com/v1beta
  timeoutMs: 30000
  apiKey: ${GEMINI_API_KEY:your-actual-api-key-here}

token:
  store:
    impl: lua
  refresh:
    ttl-seconds: 1209600
  hmac-secret: ${REFRESH_HMAC_SECRET:dev-change-me-please}

spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}  # 기본 dev
    include: oauth
    # 필요시 password, timeout 등 추가 가능
  jackson:
    serialization:
      write-dates-as-timestamps: false
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB




# 공통 설정이 있다면 여기에
jwt:
  secret: your-super-secret-key-that-should-be-long-and-secure



tour:
  api:
    base-url: http://apis.data.go.kr/B551011/KorPetTourService
    service-key: ${TOURAPI_SERVICE_KEY:}
    connection-timeout: 5000
    read-timeout: 10000
    max-retries: 3


# 앱 인증 관련 (프론트로 최종 리다이렉트되는 URL)
app:
  auth:
    success-redirect-url: ${APP_AUTH_SUCCESS_REDIRECT_URL}
    onboarding-redirect-url: ${APP_AUTH_ONBOARDING_REDIRECT_URL}



aws:
  s3:
    bucket: ${AWS_S3_BUCKET:}
    region: ${AWS_S3_REGION:ap-northeast-2}
    cloudfrontDomain: ${AWS_CLOUDFRONT_DOMAIN:}
    presignExpireSeconds: ${AWS_PRESIGN_EXPIRE_SECONDS:600}